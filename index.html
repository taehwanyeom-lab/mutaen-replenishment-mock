  const d=DB[sc].req;
  const fa=val(sc+'-f-auto'), fc=val(sc+'-f-chodo'), fb=val(sc+'-f-brand'), fst=val(sc+'-f-store'), fs=chk(sc+'-f-stock1');
  const rows=d.filter(r=>(fa==='all'||r.auto===fa)&&(fc==='all'||r.chodo===fc)&&(fb==='all'||r.brand===fb)&&(fst==='all'||r.store===fst)&&(!fs||r.stock>=1));
  const tb=document.getElementById(sc+'-req-body'); tb.innerHTML='';
  rows.forEach((r)=>{
    const i=d.indexOf(r), reqVal=r.req===null?'':r.req;
    const autoBadge=r.auto==='Y'?'<span class="badge y">Y</span>':'<span class="badge n">N</span>';
    const chodoBadge=r.chodo==='Y'?'<span class="badge chodo">초도</span>':'<span class="muted">-</span>';
    const opt=[r.color,r.size].filter(x=>x&&x!=='-').join(' / ')||'-';
    tb.insertAdjacentHTML('beforeend',`<tr>
      <td class="center"><input type="checkbox" class="${sc}-row-chk" data-i="${i}"></td>
      <td class="center">${autoBadge}</td><td>${r.store}</td><td>${r.sku}</td><td>${r.barcode}</td><td>${r.name}</td><td>${opt}</td>${ss(sc)?`<td>${r.style}</td>`:''}
      <td class="num">${r.sales7}</td><td class="num">${r.sales14}</td><td class="num">${r.storeStock}</td><td class="num">${r.inbound}</td>
      <td class="num">${r.done>0?r.done:'<span class="muted">-</span>'}</td>
      <td class="num" style="white-space:nowrap;"><input type="number" min="0" max="${r.stock}" value="${reqVal}" class="qty-input ${reqVal!==''&&reqVal>0?'req':''}" data-i="${i}" onchange="onQty('${sc}',this)"> <button class="btn sm" onclick="setMax('${sc}',${i})">최대</button></td>
      <td class="num">${r.stock}</td><td class="center">${chodoBadge}</td><td>${r.brand}</td>
      <td>${r.lastAt?r.lastAt:'<span class="muted">-</span>'}</td><td>${r.lastBy?r.lastBy:'<span class="muted">-</span>'}</td></tr>`);
  });
  document.getElementById(sc+'-req-total').textContent=rows.length;
  document.getElementById(sc+'-cnt-req').textContent=`(${d.length})`;
}
function onQty(sc,el){ const d=DB[sc].req, i=+el.dataset.i; let v=parseInt(el.value); if(isNaN(v)||v<0)v=0; if(v>d[i].stock){v=d[i].stock;toast('보충 가능 재고를 초과할 수 없습니다.');} el.value=v; d[i].req=v; el.classList.toggle('req',v>0); }
function setMax(sc,i){ DB[sc].req[i].req=DB[sc].req[i].stock; renderReq(sc); }
function toggleAll(sc,el){ document.querySelectorAll('.'+sc+'-row-chk').forEach(c=>c.checked=el.checked); }
function resetReq(sc){ [sc+'-f-auto',sc+'-f-chodo',sc+'-f-brand',sc+'-f-store'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='all';}); const s1=document.getElementById(sc+'-f-stock1'); if(s1)s1.checked=false; renderReq(sc); }
function confirmReq(sc){
  const d=DB[sc].req, sel=[...document.querySelectorAll('.'+sc+'-row-chk:checked')].map(c=>d[+c.dataset.i]);
  if(!sel.length){toast('확정할 행을 선택해 주세요.');return;}
  const qty=sel.reduce((s,r)=>s+(r.req||0),0);
  if(qty<=0){toast('보충 확정 수량이 0인 건은 확정할 수 없습니다.');return;}
  if(confirm('보충확정 하시겠습니까?')) toast(`✅ ${sel.length}개 SKU · 총 ${qty}개 보충확정 → MWMS 출고지시 (mock)`);
}

function renderAppr(sc){
  const d=DB[sc].appr;
  const fs=val(sc+'-a-status'), fst=val(sc+'-a-store');
  const rows=d.filter(r=>(fs==='all'||r.astatus===fs)&&(fst==='all'||r.store===fst));
  const tb=document.getElementById(sc+'-appr-body'); tb.innerHTML='';
  rows.forEach((r)=>{
    const i=d.indexOf(r), over=r.req>r.stock, opt=[r.color,r.size].filter(x=>x&&x!=='-').join(' / ')||'-', done=r.astatus!=='대기';
    const qtyCell=done?`<td class="num">${r.req}</td>`:`<td class="num"><input type="number" min="0" max="${r.stock}" value="${r.req}" class="qty-input ${over?'req':''}" data-i="${i}" onchange="onApprQty('${sc}',this)"></td>`;
    const cbox=done?'':`<input type="checkbox" class="${sc}-appr-chk" data-i="${i}">`;
    tb.insertAdjacentHTML('beforeend',`<tr>
      <td class="center">${cbox}</td>
      <td class="center"><span class="ast ${r.astatus}">${r.astatus}</span></td>
      <td>${r.reason?r.reason:'<span class="muted">-</span>'}</td>
      <td>${r.store}</td><td>${r.requester||'<span class="muted">-</span>'}</td><td>${r.sku}</td><td>${r.barcode}</td><td>${r.name}</td><td>${opt}</td>${ss(sc)?`<td>${r.style}</td>`:''}
      <td class="num">${r.inbound}</td><td class="num">${r.done>0?r.done:'<span class="muted">-</span>'}</td>
      ${qtyCell}<td class="num">${r.storeReq}</td><td class="num">${r.stock}</td><td>${r.brand}</td>
      <td>${r.lastAt?r.lastAt:'<span class="muted">-</span>'}</td><td>${r.lastBy&&r.lastBy!=='-'?r.lastBy:'<span class="muted">-</span>'}</td></tr>`);
  });
  document.getElementById(sc+'-appr-total').textContent=rows.length;
  document.getElementById(sc+'-cnt-appr').textContent=`(${d.length})`;
}
function toggleAllAppr(sc,el){ document.querySelectorAll('.'+sc+'-appr-chk').forEach(c=>c.checked=el.checked); }
function onApprQty(sc,el){ const d=DB[sc].appr,i=+el.dataset.i; let v=parseInt(el.value); if(isNaN(v)||v<0)v=0; d[i].req=v; el.classList.toggle('req',v>d[i].stock); }
function resetAppr(sc){ const a=document.getElementById(sc+'-a-status'); if(a)a.value='all'; const st=document.getElementById(sc+'-a-store'); if(st)st.value='all'; renderAppr(sc); }
function approve(sc){
  const d=DB[sc].appr, idx=[...document.querySelectorAll('.'+sc+'-appr-chk:checked')].map(c=>+c.dataset.i);
  if(!idx.length){toast('승인할 요청을 선택해 주세요.');return;}
  const over=idx.filter(i=>d[i].req>d[i].stock);
  if(over.length){toast(`⚠ ${over.length}건은 확정수량 > 보충 가능 재고 — 승인 불가`);return;}
  if(!confirm('승인 시 즉시 물류시스템으로 보충 지시 됩니다. 진행하시겠습니까?')) return;
  idx.forEach(i=>{ d[i].astatus='승인'; d[i].reason=''; d[i].lastAt='2026-06-23 17:40'; d[i].lastBy='염태환'; });
  renderAppr(sc); toast(`✅ ${idx.length}건 승인 → 즉시 출고지시 (mock)`);
}
function reject(sc){
  const d=DB[sc].appr, idx=[...document.querySelectorAll('.'+sc+'-appr-chk:checked')].map(c=>+c.dataset.i);
  if(!idx.length){toast('반려할 요청을 선택해 주세요.');return;}
  const reason=prompt('반려 사유를 입력해 주세요. (매장에 회신됩니다)');
  if(reason===null) return;
  if(!reason.trim()){toast('반려 사유는 필수입니다.');return;}
  idx.forEach(i=>{ d[i].astatus='반려'; d[i].reason=reason.trim(); d[i].lastAt='2026-06-23 17:42'; d[i].lastBy='염태환'; });
  renderAppr(sc); toast(`⛔ ${idx.length}건 반려 → 사유 회신 (mock)`);
}

function stClass(s){ return s.includes('완료')?'완료':s.includes('이동')?'이동':s.includes('대기')?'대기':'지시'; }
function renderStatus(sc){
  const d=DB[sc].status;
  const fs=val(sc+'-s-status'), fst=val(sc+'-st-store'), fb=val(sc+'-st-brand'), fa=val(sc+'-st-auto');
  const rows=d.filter(r=>(fs==='all'||r.status===fs)&&(fst==='all'||r.store===fst)&&(fb==='all'||r.brand===fb)&&(fa==='all'||r.auto===fa));
  const tb=document.getElementById(sc+'-status-body'); tb.innerHTML='';
  const span=ss(sc)?15:14;
  rows.forEach((r)=>{
    const i=d.indexOf(r), opt=[r.color,r.size].filter(x=>x&&x!=='-').join(' / ')||'-', centers=r.centers.map(c=>c.center).join(', ');
    const autoBadge=r.auto==='Y'?'<span class="badge y">Y</span>':'<span class="badge n">N</span>';
    tb.insertAdjacentHTML('beforeend',`<tr onclick="toggleSub('${sc}',${i})" style="cursor:pointer;">
      <td class="center"><span class="exp-btn" id="${sc}-exp-${i}">▸</span></td>
      <td class="center">${autoBadge}</td>
      <td>${r.store}</td><td>${r.sku}</td><td>${r.barcode}</td><td>${r.name}</td><td>${opt}</td>${ss(sc)?`<td>${r.style}</td>`:''}<td>${r.brand}</td>
      <td class="num">${r.conf}</td><td class="num">${r.out}</td><td class="num">${r.inq}</td>
      <td class="center"><span class="st ${stClass(r.status)}">${r.status}</span></td><td>${centers}</td><td>${r.at}</td></tr>
      <tr class="subrow" id="${sc}-sub-${i}" style="display:none;"><td colspan="${span}"><div class="subwrap">
        <table><thead><tr><th>출고지</th><th>이동번호</th><th>출고번호</th><th>입고번호</th><th class="num">출고</th><th class="num">이동</th><th class="num">입고</th><th class="center">상태</th><th>처리일시</th></tr></thead>
        <tbody>${r.centers.map(c=>`<tr><td>${c.center}</td><td>${c.move}</td><td>${c.out}</td><td>${c.in}</td><td class="num">${c.outQty}</td><td class="num">${c.moveQty}</td><td class="num">${c.inQty}</td><td class="center"><span class="st ${stClass(c.status)}">${c.status}</span></td><td>${c.at}</td></tr>`).join('')}</tbody></table>
      </div></td></tr>`);
  });
  document.getElementById(sc+'-st-total').textContent=rows.length;
}
function toggleSub(sc,i){ const sub=document.getElementById(sc+'-sub-'+i), exp=document.getElementById(sc+'-exp-'+i); const open=sub.style.display==='none'; sub.style.display=open?'table-row':'none'; exp.textContent=open?'▾':'▸'; }

// ================= 탭 / 페이지 =================
function switchTab(sc,t){
  document.getElementById(sc+'-tab-req-btn').classList.toggle('active',t==='req');
  document.getElementById(sc+'-tab-appr-btn').classList.toggle('active',t==='appr');
  document.getElementById(sc+'-tab-req').style.display=t==='req'?'block':'none';
  document.getElementById(sc+'-tab-appr').style.display=t==='appr'?'block':'none';
}
function goPage(p){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===p));
  ['mt-request','mt-status','ep-request','ep-status','mt-return','ep-return','inv-move'].forEach(pg=>{ document.getElementById('page-'+pg).style.display = pg===p?'block':'none'; });
}
function placeholderHTML(crumb, title){
  return `<div class="crumb">${crumb}</div><h1>${title} <span class="muted" style="font-size:12px;font-weight:400;">· MOCK</span></h1>
    <div style="padding:48px;text-align:center;color:#9ca3af;background:#fff;border:1px dashed #d1d5db;border-radius:8px;">화면 준비 중</div>`;
}

// ================= 토스트 / 카운트다운 =================
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
const deadline=Date.now()+(7*3600+47*60)*1000;
function tick(){ let s=Math.max(0,Math.floor((deadline-Date.now())/1000)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); const txt=s>0?`(${h}시간 ${m}분 남음)`:'(마감)'; document.querySelectorAll('.countdown').forEach(e=>e.textContent=txt); document.querySelectorAll('.btn-confirm').forEach(b=>b.disabled=s<=0); }

// ================= 매장간 이동 모달 =================
let moveScope='mt';
const moveData={
  mt:[ {from:'성수', to:'홍대', sku:'S001', barcode:'8809000000001', qty:3, avail:7},
       {from:'강남', to:'명동', sku:'S014', barcode:'8809000000144', qty:5, avail:14} ],
  ep:[ {from:'무신사 스토어 강남', to:'무신사 스토어 홍대', sku:'E001', barcode:'8809100000011', qty:2, avail:6},
       {from:'무신사 스토어 성수@대림창고', to:'무신사 스토어 명동', sku:'E006', barcode:'8809100000066', qty:4, avail:9} ],
};
function openMove(sc){ moveScope=sc; document.getElementById('move-title').textContent=(sc==='mt'?'무탠':'편집샵')+' 매장간 이동'; renderMove(); document.getElementById('move-bg').classList.add('show'); }
function closeMove(){ document.getElementById('move-bg').classList.remove('show'); }
function addMoveRow(){ moveData[moveScope].push({from:'', to:'', sku:'', barcode:'', qty:0, avail:0}); renderMove(); }
function delMoveRow(i){ moveData[moveScope].splice(i,1); renderMove(); }
function mField(i,f,v){ moveData[moveScope][i][f]=(f==='qty'||f==='avail')?(parseInt(v)||0):v; renderMove(); }
function moveOpts(sel){ return '<option value="">선택</option>'+STORES[moveScope].map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join(''); }
function renderMove(){
  const d=moveData[moveScope], tb=document.getElementById('move-body'); tb.innerHTML='';
  d.forEach((r,i)=>{
    const dup=r.from&&r.to&&r.from===r.to, over=r.qty>r.avail;
    tb.insertAdjacentHTML('beforeend',`<tr>
      <td><select class="m-sel ${dup?'m-err':''}" onchange="mField(${i},'from',this.value)">${moveOpts(r.from)}</select></td>
      <td><select class="m-sel ${dup?'m-err':''}" onchange="mField(${i},'to',this.value)">${moveOpts(r.to)}</select></td>
      <td><input class="m-in" style="width:110px" value="${r.sku}" onchange="mField(${i},'sku',this.value)" placeholder="SKU번호"></td>
      <td><input class="m-in" style="width:120px" value="${r.barcode}" onchange="mField(${i},'barcode',this.value)" placeholder="바코드"></td>
      <td class="num"><input type="number" min="0" class="m-in num ${over?'m-err':''}" value="${r.qty}" onchange="mField(${i},'qty',this.value)"></td>
      <td class="num">${r.avail}</td>
      <td class="center"><button class="btn sm" onclick="delMoveRow(${i})">🗑</button></td></tr>`);
  });
  const froms=new Set(d.filter(r=>r.from).map(r=>r.from)), tos=new Set(d.filter(r=>r.to).map(r=>r.to));
  const pcs=d.reduce((s,r)=>s+(r.qty||0),0);
  document.getElementById('move-summary').textContent=`출발 ${froms.size}곳 → 도착 ${tos.size}곳 · 총 ${d.length}건 / ${pcs}pcs`;
}
function submitMove(){
  const d=moveData[moveScope];
  if(!d.length){ toast('이동 행을 추가해 주세요.'); return; }
  const errs=[];
  d.forEach((r,i)=>{
    if(!r.from||!r.to||!r.sku||!r.qty) errs.push(`${i+1}행: 출발/도착/SKU/수량 필수`);
    else if(r.from===r.to) errs.push(`${i+1}행: 출발=도착 불가`);
    else if(r.qty>r.avail) errs.push(`${i+1}행: 수량>출발 보유재고`);
  });
  if(errs.length){ toast('⚠ '+errs[0]+(errs.length>1?` 외 ${errs.length-1}건`:'')); return; }
  const pcs=d.reduce((s,r)=>s+r.qty,0);
  if(confirm(`총 ${d.length}건 / ${pcs}pcs 매장간 이동을 지시하시겠습니까?`)){
    toast(`✅ ${d.length}건 매장간 이동 지시 → MWMS 전송 (mock)`); closeMove();
  }
}

// ================= init =================
document.getElementById('page-mt-request').innerHTML=requestPageHTML('mt','무탠');
document.getElementById('page-mt-status').innerHTML=statusPageHTML('mt','무탠');
document.getElementById('page-ep-request').innerHTML=requestPageHTML('ep','편집샵');
document.getElementById('page-ep-status').innerHTML=statusPageHTML('ep','편집샵');
document.getElementById('page-mt-return').innerHTML=placeholderHTML('무탠 스토어 관리 › 무탠 반품관리','무탠 반품관리');
document.getElementById('page-ep-return').innerHTML=placeholderHTML('편집샵 스토어 관리 › 편집샵 반품관리','편집샵 반품관리');
document.getElementById('page-inv-move').innerHTML=placeholderHTML('재고 › 재고이동','재고이동');
['mt','ep'].forEach(sc=>{ renderReq(sc); renderAppr(sc); renderStatus(sc); });
setInterval(tick,1000); tick();
</script>
</body>
</html>
